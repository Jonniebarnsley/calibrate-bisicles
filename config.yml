# --- Calibration configuration ---
# Runs should change ONLY this file, never code.

paths:
  ensemble:
    - "WAIS_2007-2300_sle.csv"
    - "EAIS_2007-2300_sle.csv"
    - "APIS_2007-2300_sle.csv"
  imbie:
    - "imbie_west_antarctica_2021_mm.csv"
    - "imbie_east_antarctica_2021_mm.csv"
    - "imbie_antarctic_peninsula_2021_mm.csv"
  outputs: "outputs"

data:
  param_cols: ["aPhi", "n", "m", "uf", "gamma", "UMV"]  # the 6 free parameters
  log_cols: ["aPhi", "gamma", "UMV"]                    # sampled/normalised on log10
  gcm_input_cols: ["CESM2-WACCM", "MRI-ESM2-0", "MIROC-ES2L"] # EC-Earth3-Veg = (0, 0, 0)
  forcing_cols: ["GMSTa"] # functions of (gcm, scenario)
  gcm_col: "model"
  scenario_col: "scenario"

priors:
  aPhi:  [1.0e+9, 1.0e+17]
  "n":   [2, 4]              # n in quotes because bare n is YAML boolean false
  m:     [1, 5]
  uf:    [50, 300]
  gamma: [9619, 159189]
  UMV:   [6.0e+17, 1.0e+21]

obs:
  baseline_year: 2007        # ensemble slc baseline (slc == 0 here)
  target_year: 2021          # cumulative-window end; IMBIE record actually ends 2020.92

emulator:
  kernel_type: "matern_5_2"
  alpha: 1.9
  nugget_est: true
  leave_one_out: true                # write LOO scatter PDFs to outputs/diagnostics/
  main_effects: true                 # write main-effects sweep PDFs to outputs/diagnostics/
  main_effects_gcm: "CESM2-WACCM"    # anchor GCM for the main-effects sweep (dummies one-hot)
  main_effects_scenario: "ssp585"    # anchor scenario for the main-effects sweep (forcing fixed)
  diagnostic_years: [2021, 2300]     # years at which to produce LOO or main-effects plots

# Emulator mode: per-year GPs (default) vs SVD basis-function emulator (Higdon 2008).
svd:
  enabled: true             # false = one GP per year; true = SVD coefficient emulators
  n_components: 5           # number of SVD components to emulate when enabled
  run_diagnostic: false     # write outputs/svd_diagnostic.csv (r=1..9 reconstruction metrics)

weighting:
  obs_ref_scenario: "ssp126"   # forcing lookup for obs period (period is forcing-inert)
  n_samples: 10000             # K dense prior draws per GCM stratum
  sigma_mod_mult: 2            # model discrepancy sigma_mod = sigma_mod_mult * sigma_obs
  likelihood: "gaussian"       # gaussian | student_t
  student_t_df: 4              # degrees of freedom if likelihood == student_t
  seed: 1

projection:
  year_from: 2007
  year_to: 2300
  year_by: 1
  gcm_marginal: true           # also report a uniform-GCM-prior marginal
  cache_emulators: true        # cache per-year GPs in outputs/emulators/

# sensitivity to choice of model discrepancy
sensitivity:
  report_years: [2100, 2300]
  sigma_mod_mult: [1, 2, 4, 10]            # model discrepancy
  likelihood: ["gaussian", "student_t"]    # robustness to outlying runs

# Variance decomposition (run_variance.R) — prior-ensemble uncertainty attribution.
# ANOVA over discrete factors (gcm, scenario) on the raw ensemble, plus Sobol' over
# the 6 continuous params + a forcing-severity axis via the emulator. Independent of
# the calibration weighting.
variance:
  year_from: 2010
  year_to: 2300
  year_by: 1                   # timestep stride for the decomposition
  sobol_n: 4000                # Saltelli base sample N; total emulator evals = N*(k+2)
  sobol_convergence: [1000, 2000, 4000, 8000]  # N values for a one-off convergence check
  sobol_smooth_window: 5       # smoothing window for the Sobol' plots; set to 1 to disable
